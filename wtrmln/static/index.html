<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>wtrmln — Data Platform</title>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --panel2: #1e2230; --line: #2a3040;
    --text: #e8eaf0; --muted: #8b93a7; --accent: #ff4757; --green: #2ecc71;
    --amber: #f5a623;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text);
         font: 15px/1.5 -apple-system, "Segoe UI", Roboto, sans-serif; }
  header { display: flex; align-items: center; gap: 12px; padding: 18px 28px;
           border-bottom: 1px solid var(--line); }
  header .logo { font-size: 26px; }
  header h1 { font-size: 18px; margin: 0; font-weight: 600; }
  header .sub { color: var(--muted); font-size: 13px; }
  main { display: grid; grid-template-columns: 340px 1fr; gap: 0;
         height: calc(100vh - 63px); }
  #sidebar { border-right: 1px solid var(--line); overflow-y: auto; padding: 20px; }
  h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .08em;
       color: var(--muted); margin: 18px 0 10px; }
  .card { background: var(--panel); border: 1px solid var(--line);
          border-radius: 10px; padding: 14px; margin-bottom: 10px; }
  .card .row { display: flex; align-items: center; gap: 10px; }
  .card .icon { font-size: 22px; }
  .card .name { font-weight: 600; }
  .card .desc { color: var(--muted); font-size: 12.5px; margin-top: 6px; }
  button { background: var(--accent); color: white; border: 0; border-radius: 7px;
           padding: 7px 14px; font-size: 13.5px; font-weight: 600; cursor: pointer; }
  button.secondary { background: var(--panel2); color: var(--text);
                     border: 1px solid var(--line); }
  button:disabled { opacity: .45; cursor: default; }
  .conn { font-size: 13px; }
  .conn .status { font-weight: 600; }
  .status.connected { color: var(--green); }
  .status.failed, .status.blocked, .status.aborted { color: var(--accent); }
  .status.agent_working, .status.starting { color: var(--amber); }
  .status.awaiting_user { color: #6fb1ff; }
  #stage { display: flex; flex-direction: column; overflow: hidden; }
  #banner { display: none; padding: 12px 20px; background: #12365e;
            border-bottom: 1px solid #1f4d80; font-size: 14px; }
  #banner.show { display: flex; align-items: center; gap: 14px; }
  #banner button { background: #2ecc71; }
  #stagebody { display: grid; grid-template-columns: 1fr 360px; flex: 1; min-height: 0; }
  #screenwrap { padding: 18px; overflow: auto; }
  #screen { width: 100%; max-width: 1280px; border: 1px solid var(--line);
            border-radius: 8px; display: block; background: #000; }
  #screen.interactive { cursor: crosshair; box-shadow: 0 0 0 2px #6fb1ff; }
  #feed { border-left: 1px solid var(--line); overflow-y: auto; padding: 16px;
          font-size: 13.5px; }
  .ev { margin-bottom: 10px; }
  .ev .t { color: var(--muted); font-size: 11px; }
  .ev.agent { background: var(--panel); border: 1px solid var(--line);
              border-radius: 8px; padding: 8px 10px; }
  .ev.action { color: var(--muted); font-family: ui-monospace, monospace; font-size: 12px; }
  .ev.cred { color: var(--green); }
  #typebar { display: none; gap: 8px; padding: 10px 18px;
             border-top: 1px solid var(--line); }
  #typebar.show { display: flex; }
  #typebar input { flex: 1; background: var(--panel); color: var(--text);
                   border: 1px solid var(--line); border-radius: 7px; padding: 8px 10px; }
  #placeholder { color: var(--muted); padding: 60px; text-align: center; }
</style>
</head>
<body>
<header>
  <div class="logo">🍉</div>
  <div>
    <h1>wtrmln data platform</h1>
    <div class="sub">Agent-first integrations — click connect, log in, done.</div>
  </div>
</header>
<main>
  <div id="sidebar">
    <h2>Connect a source</h2>
    <div id="connectors"></div>
    <h2>Connections</h2>
    <div id="connections"></div>
  </div>
  <div id="stage">
    <div id="banner">
      <span id="bannertext"></span>
      <button onclick="resumeSession()">I've logged in — continue</button>
      <button class="secondary" onclick="abortSession()">Cancel</button>
    </div>
    <div id="stagebody">
      <div id="screenwrap">
        <div id="placeholder">Pick a source on the left. The agent opens a secure
          browser, you log in once, and it configures everything for you —
          watch it work here.</div>
        <img id="screen" style="display:none" alt="agent browser">
      </div>
      <div id="feed"></div>
    </div>
    <div id="typebar">
      <input id="typeinput" placeholder="Type here — sent straight to the browser (never to the AI). Enter submits.">
      <button class="secondary" onclick="sendKey('Tab')">Tab</button>
    </div>
  </div>
</main>
<script>
let currentSession = null;
let awaiting = false;
let evtSource = null;

async function loadConnectors() {
  const list = await (await fetch('/api/connectors')).json();
  const el = document.getElementById('connectors');
  el.innerHTML = '';
  for (const c of list) {
    const d = document.createElement('div');
    d.className = 'card';
    d.innerHTML = `<div class="row"><span class="icon">${c.icon || '🔌'}</span>
      <span class="name">${c.name}</span>
      <span style="flex:1"></span>
      <button onclick="connect('${c.slug}')">Connect</button></div>
      <div class="desc">${c.description || ''}</div>`;
    el.appendChild(d);
  }
}

async function loadConnections() {
  const list = await (await fetch('/api/connections')).json();
  const el = document.getElementById('connections');
  el.innerHTML = list.length ? '' : '<div class="conn" style="color:var(--muted)">None yet.</div>';
  for (const c of list) {
    const d = document.createElement('div');
    d.className = 'card conn';
    d.innerHTML = `<b>${c.connector}</b> — <span class="status ${c.status}">${c.status.replace('_',' ')}</span>
      ${c.summary ? `<div class="desc">${c.summary}</div>` : ''}
      ${c.session_id ? `<div style="margin-top:6px"><button class="secondary" onclick="watch('${c.session_id}')">Watch</button></div>` : ''}`;
    el.appendChild(d);
  }
}

async function connect(slug) {
  const r = await (await fetch('/api/connections', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({connector: slug})})).json();
  watch(r.session_id);
  loadConnections();
}

function watch(sessionId) {
  currentSession = sessionId;
  document.getElementById('feed').innerHTML = '';
  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('screen').style.display = 'block';
  if (evtSource) evtSource.close();
  evtSource = new EventSource(`/api/sessions/${sessionId}/events`);
  evtSource.onmessage = (m) => handleEvent(JSON.parse(m.data));
}

function feed(html, cls) {
  const d = document.createElement('div');
  d.className = 'ev ' + (cls || '');
  d.innerHTML = html;
  const f = document.getElementById('feed');
  f.appendChild(d);
  f.scrollTop = f.scrollHeight;
}

function handleEvent(e) {
  if (e.type === 'screen') refreshScreen();
  else if (e.type === 'agent_message') feed(e.text, 'agent');
  else if (e.type === 'log') feed(e.text);
  else if (e.type === 'action') feed(`▸ ${e.action} ${JSON.stringify(e.detail || {})}`, 'action');
  else if (e.type === 'credential_saved') feed(`🔐 Saved <b>${e.name}</b> to encrypted vault`, 'cred');
  else if (e.type === 'status') {
    setAwaiting(e.status === 'awaiting_user', e.reason);
    feed(`<b>Status:</b> <span class="status ${e.status}">${e.status.replace('_',' ')}</span>` +
         (e.summary ? `<div>${e.summary}</div>` : ''));
    loadConnections();
  }
}

function setAwaiting(on, reason) {
  awaiting = on;
  document.getElementById('banner').className = on ? 'show' : '';
  document.getElementById('typebar').className = on ? 'show' : '';
  document.getElementById('screen').className = on ? 'interactive' : '';
  if (on) document.getElementById('bannertext').textContent =
    '🔒 ' + (reason || 'Please log in.') + ' Your input goes directly to the site — the AI never sees it.';
}

async function refreshScreen() {
  if (!currentSession) return;
  const img = document.getElementById('screen');
  img.src = `/api/sessions/${currentSession}/screen?ts=${Date.now()}`;
}

document.getElementById('screen').addEventListener('click', async (ev) => {
  if (!awaiting || !currentSession) return;
  const img = ev.target;
  const rect = img.getBoundingClientRect();
  const x = (ev.clientX - rect.left) * (1280 / rect.width);
  const y = (ev.clientY - rect.top) * (800 / rect.height);
  await fetch(`/api/sessions/${currentSession}/input`, {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({kind: 'click', x, y})});
});

document.getElementById('typeinput').addEventListener('keydown', async (ev) => {
  if (!awaiting || !currentSession) return;
  if (ev.key === 'Enter') {
    const val = ev.target.value;
    ev.target.value = '';
    if (val) await fetch(`/api/sessions/${currentSession}/input`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({kind: 'type', text: val})});
    await sendKey('Return');
  }
});

async function sendKey(key) {
  if (!currentSession) return;
  await fetch(`/api/sessions/${currentSession}/input`, {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({kind: 'key', text: key})});
}

async function resumeSession() {
  if (!currentSession) return;
  await fetch(`/api/sessions/${currentSession}/resume`, {method: 'POST'});
}

async function abortSession() {
  if (!currentSession) return;
  await fetch(`/api/sessions/${currentSession}/abort`, {method: 'POST'});
}

loadConnectors();
loadConnections();
setInterval(loadConnections, 5000);
</script>
</body>
</html>
